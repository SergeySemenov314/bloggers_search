server {
    listen 80;

    # Весь трафик приходит с префиксом /bloggers/ от главного nginx.
    # Vite собран с base=/bloggers/, поэтому ассеты тоже под этим префиксом.
    location /bloggers/ {
        alias /usr/share/nginx/html/;
        # SPA-фолбэк: любой не-файловый путь отдаёт index.html
        try_files $uri $uri/ /bloggers/index.html;
    }
}
